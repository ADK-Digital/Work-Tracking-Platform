services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file:
      - ./server/.env.prod
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        S3_BUCKET="$${S3_BUCKET:-attachments}"

        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          echo "Waiting for MinIO..."
          sleep 1
        done

        mc mb --ignore-existing "local/$${S3_BUCKET}"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    environment:
      NODE_OPTIONS: --openssl-legacy-provider
      FRONTEND_URL: ${FRONTEND_URL:-http://pm.local}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://pm.local/auth/google/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://pm.local}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["sh", "-c", "npx prisma migrate deploy && node --openssl-legacy-provider dist/server.js"]
    expose:
      - "3001"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_USE_API: ${VITE_USE_API:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
