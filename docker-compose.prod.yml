services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2026-01-03T00-00-00Z
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - "3001"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_USE_API: ${VITE_USE_API:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
