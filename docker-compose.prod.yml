services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file:
      - ./server/.env.prod
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-attachments}
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${S3_ACCESS_KEY:-minioadmin}" "${S3_SECRET_KEY:-minioadmin}"; do
          echo "Waiting for MinIO..."
          sleep 1
        done
        mc mb --ignore-existing "local/${S3_BUCKET:-attachments}"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/server.js"]
    expose:
      - "3001"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_USE_API: ${VITE_USE_API:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data: