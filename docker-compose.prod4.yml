services:
  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    # Postgres image uses these specific names to initialize
    environment:
      - POSTGRES_USER=tracker
      - POSTGRES_PASSWORD=tracker
      - POSTGRES_DB=special_projects
    volumes:
      - bscsd-pm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d special_projects"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    # MinIO uses these specific variables for the root admin
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - bscsd-pm_minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    container_name: bscsd-pm-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "3001"
    env_file:
      - server.env
    secrets:
      - bscsd-cms-directory-reader
    volumes:
      - /home/local-admin/pm/bscsd-cms-directory-reader.json:/app/secrets/bscsd-cms-directory-reader.json:ro,Z
    environment:
      NODE_OPTIONS: --openssl-legacy-provider
      FRONTEND_URL: ${FRONTEND_URL:-https://pm-dev.bscsd.org}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://pm-dev.bscsd.org/auth/google/callback}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://pm-dev.bscsd.org}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      GOOGLE_SERVICE_ACCOUNT_JSON: /app/secrets/bscsd-cms-directory-reader.json
    read_only: false 
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        # Inject the secrets into the environment variables
        npx prisma migrate deploy
        node --openssl-legacy-provider dist/server.js
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_USE_API: ${VITE_USE_API:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend 
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    read_only: true
    security_opt:
      - no-new-privileges:true
      - label=disable
    tmpfs:
      - /var/run
      - /tmp
      - /var/cache/nginx
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - CHOWN
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bscsd-pm_postgres_data:
  bscsd-pm_minio_data:

secrets:
  bscsd-cms-directory-reader:
    file: /home/local-admin/pm/bscsd-cms-directory-reader.json
  server-env:
    file: /home/local-admin/pm/server.env.prod
